<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOVIES.pop - חוויה פרימיום</title>

<style>
/* ------------------- BODY ------------------- */
body {
  margin:0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#6a00ff,#ff4fd8);
  overflow-x:hidden;
  color:white;
}

/* ------------------- HEADER ------------------- */
header {
  display:flex;
  justify-content: space-between;
  align-items:center;
  padding: 15px 30px;
  position: relative;
  z-index:2;
}

.logoWrap {
  display:flex;
  align-items:center;
  gap:15px;
}

.logoWrap img {
  width:55px;
  height:55px;
  animation: pop 1s ease;
}

.brand {
  font-size:28px;
  font-weight:bold;
}

/* ------------------- BUTTON PREMIUM ------------------- */
.premiumGift {
  display:inline-block;
  padding:12px 25px;
  border-radius:18px;
  background: linear-gradient(135deg,#ff4fd8,#6a00ff);
  color:white;
  font-weight:bold;
  text-decoration:none;
  cursor:pointer;
  transition: transform 0.3s;
  position:relative;
}

.premiumGift:hover {
  transform: scale(1.1);
}

/* ------------------- ANIMATIONS ------------------- */
@keyframes pop {
  0% { transform: scale(0.5); opacity:0; }
  60% { transform: scale(1.2); }
  100% { transform: scale(1); opacity:1; }
}

/* ------------------- CLOUDS ------------------- */
.cloud {
  position:absolute;
  background: rgba(255,255,255,0.15);
  border-radius: 50%;
  filter: blur(25px);
  animation: moveClouds linear infinite;
  z-index:0;
}

.cloud1 { width: 400px; height:200px; top: 10%; left:-400px; animation-duration:120s; }
.cloud2 { width: 250px; height:120px; top:50%; left:-300px; animation-duration:90s; }
.cloud3 { width: 350px; height:180px; top:30%; left:-350px; animation-duration:150s; }

@keyframes moveClouds { 0% { transform: translateX(0); } 100% { transform: translateX(200vw); } }

/* ------------------- GRID סרטים ------------------- */
.grid {
  display:grid;
  grid-template-columns: repeat(auto-fill,minmax(200px,1fr));
  gap:25px;
  padding:25px;
  position: relative;
  z-index:1;
}

.card {
  position: relative;
  overflow: hidden;
  border-radius:18px;
  transition: transform 0.3s, box-shadow 0.3s;
  cursor:pointer;
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 10px 25px rgba(255,255,255,0.4);
}

.card img {
  width:100%;
  display:block;
  border-radius:18px;
  transition: transform 0.3s;
}

.card:hover img {
  transform: scale(1.1);
}

.card h3 {
  text-align:center;
  margin:7px 0;
  font-size:16px;
}

/* ------------------- MODAL ------------------- */
.modal {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.9);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  transition: opacity 0.3s;
}

.modal.hidden { display:none; }

.playerBox {
  position:relative;
  width:85%;
  max-width:900px;
  height:500px;
}

.playerBox iframe {
  width:100%;
  height:100%;
  border:none;
  border-radius:18px;
}

.closeBtn {
  position:absolute;
  top:10px;
  right:10px;
  background:none;
  border:none;
  color:white;
  font-size:28px;
  cursor:pointer;
}

/* ------------------- PARTICLES ------------------- */
.buttonWrap {
  position: relative;
  display:inline-block;
}

.particles {
  position: absolute;
  bottom: -10px;
  left: 50%;
  width: 160px;
  height: 60px;
  transform: translateX(-50%);
  pointer-events: none;
}

.particle {
  position: absolute;
  width: 6px;
  height: 6px;
  background: white;
  border-radius: 50%;
  opacity: 0.8;
  animation: rise 1s linear infinite;
}

@keyframes rise {
  0% { transform: translateY(0) scale(0.5); opacity:1; }
  100% { transform: translateY(-50px) scale(0); opacity:0; }
}

/* ------------------- PREMIUM FORM ------------------- */
#proBox {
  width:90%;
  max-width:950px;
  background:rgba(255,255,255,0.1);
  border-radius:25px;
  padding:30px;
  display:flex;
  gap:30px;
  backdrop-filter: blur(15px);
  margin:30px auto;
  flex-wrap:wrap;
}

.left, .right { flex:1; min-width:250px; }

.logo { font-size:32px; font-weight:bold; margin-bottom:20px; animation: pop 1s ease; }

input { width:100%; padding:12px; margin-bottom:10px; border:none; border-radius:12px; }
button { width:100%; padding:14px; border:none; border-radius:14px; background:linear-gradient(135deg,#ff4fd8,#6a00ff); color:white; font-size:16px; cursor:pointer; transition:0.3s; }
button:hover { transform:scale(1.05); }

.success { display:none; text-align:center; font-size:18px; margin-top:10px; color:#f1c40f; }
</style>

</head>
<body>

<!-- ☁️ עננים -->
<div class="cloud cloud1"></div>
<div class="cloud cloud2"></div>
<div class="cloud cloud3"></div>

<!-- 🔥 HEADER -->
<header>
  <div class="logoWrap">
    <img src="https://i.ibb.co/7QpKsCX/logo.png" alt="MOVIES.pop logo">
    <h1 class="brand">MOVIES.pop</h1>
  </div>

  <div class="buttonWrap">
    <a class="premiumGift">🎁 פרימיום</a>
    <div class="particles"></div>
  </div>
</header>

<!-- 📦 GRID סרטים -->
<main id="movieGrid" class="grid"></main>

<!-- 🎬 MODAL נגן -->
<div id="playerModal" class="modal hidden">
  <div class="playerBox">
    <iframe id="player" allowfullscreen></iframe>
    <button class="closeBtn" onclick="closeModal()">✖</button>
  </div>
</div>

<!-- 🏆 PREMIUM FORM -->
<div id="proBox">
  <div class="left">
    <div class="logo">🌟 MOVIES.pop</div>
    <h2>30 יום חינם</h2>
    <p>כל הסרטים והסדרות פתוחים לצפייה</p>
    <p>✔ גישה מלאה</p>
    <p>✔ אזור אישי</p>
    <p>✔ ללא התחייבות</p>
  </div>
  <div class="right">
    <div id="form">
      <input id="user" placeholder="שם משתמש">
      <input id="email" placeholder="אימייל">
      <input id="pass" type="password" placeholder="סיסמה">
      <label><input type="checkbox" id="ok"> מאשר תנאים</label>
      <div class="buttonWrap">
        <button>התחל עכשיו</button>
        <div class="particles"></div>
      </div>
    </div>
    <div id="done" class="success">🎉 ברוך הבא! יש לך 30 יום חינם 🔥</div>
  </div>
</div>

<script>
// ===================== SAMPLE MOVIES =====================
const movies = [
  { id:"1a2b3c4d5e", title:"סרט הרפתקאות 1", image:"https://i.ibb.co/3R4w8PJ/movie1.jpg" },
  { id:"2b3c4d5e6f", title:"סרט פעולה 2", image:"https://i.ibb.co/KxFg5Jf/movie2.jpg" },
  { id:"3c4d5e6f7g", title:"סרט קומדיה 3", image:"https://i.ibb.co/58dZ5L7/movie3.jpg" }
];

// ===================== PREMIUM CHECK =====================
function isPremium() {
  const user = localStorage.getItem("premiumUser");
  const expire = new Date(localStorage.getItem("premiumExpire"));
  return user && new Date() < expire;
}

// ===================== MODAL & PLAYER =====================
const movieGrid = document.getElementById("movieGrid");
const playerModal = document.getElementById("playerModal");
const player = document.getElementById("player");

function loadMovies() {
  movies.forEach(movie => {
    const card = document.createElement('div');
    card.classList.add('card');
    card.innerHTML = `
      <img src="${movie.image}" alt="${movie.title}">
      <h3>${movie.title}</h3>
    `;
    card.addEventListener('click', () => openModal(movie.id, movie.title));
    movieGrid.appendChild(card);
  });
}

function openModal(id, title) {
  if (!isPremium()) {
    if(confirm(`${title} זמין רק למנויי פרימיום! הירשם עכשיו ל-30 יום חינם.`)) {
      document.getElementById("form").scrollIntoView({behavior:"smooth"});
    }
    return;
  }
  player.src = `https://drive.google.com/file/d/${id}/preview`;
  playerModal.classList.remove('hidden');
}

function closeModal() {
  player.src = '';
  playerModal.classList.add('hidden');
}

// ===================== PARTICLES =====================
function spawnParticles(containerSelector=".particles") {
  const container = document.querySelector(containerSelector);
  if (!container) return;
  for (let i = 0; i < 20; i++) {
    const p = document.createElement("div");
    p.className = "particle";
    p.style.left = Math.random() * 100 + "%";
    p.style.animationDuration = (0.8 + Math.random() * 0.7) + "s";
    container.appendChild(p);
    setTimeout(() => p.remove(), 1300);
  }
}

document.querySelectorAll(".premiumGift, #form button").forEach(btn => {
  btn.addEventListener("mouseenter", () => spawnParticles());
});

// ===================== PREMIUM FORM =====================
function setupPremiumForm() {
  const form = document.getElementById("form");
  const done = document.getElementById("done");
  if (!form || !done) return;

  form.querySelector("button").addEventListener("click", () => {
    const u = form.querySelector("#user").value;
    const e = form.querySelector("#email").value;
    const p = form.querySelector("#pass").value;
    const ok = form.querySelector("#ok").checked;

    if (!u || !e || !p) return alert("תמלא את כל השדות");
    if (!ok) return alert("נא לאשר את התנאים");

    const expire = new Date();
    expire.setDate(expire.getDate() + 30);
    localStorage.setItem("premiumUser", u);
    localStorage.setItem("premiumExpire", expire);

    form.style.display = "none";
    done.style.display = "block";
    spawnParticles("#done .particles");
  });
}

// ===================== INIT =====================
window.addEventListener("load", () => {
  loadMovies();
  setupPremiumForm();
});
</script>

</body>
</html>
