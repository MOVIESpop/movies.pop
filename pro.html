<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>פרימיום - 30 יום חינם</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#6a00ff,#ff4fd8);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  overflow:hidden;
}

/* ☁️ עננים */
.cloud {
  position:absolute;
  background:white;
  border-radius:50%;
  opacity:0.15;
  filter:blur(20px);
  animation: moveClouds 60s linear infinite;
}

.cloud:nth-child(1){
  width:300px;height:150px;top:10%;left:-200px;
}
.cloud:nth-child(2){
  width:200px;height:100px;top:70%;left:-150px;
  animation-duration:80s;
}

@keyframes moveClouds {
  from { transform: translateX(0); }
  to { transform: translateX(150vw); }
}

/* 📦 קופסה */
.box {
  width:90%;
  max-width:950px;
  background:rgba(255,255,255,0.1);
  border-radius:25px;
  padding:30px;
  display:flex;
  gap:30px;
  backdrop-filter: blur(15px);
  z-index:2;
}

/* 🎉 שם האתר POP */
.logo {
  font-size:32px;
  font-weight:bold;
  margin-bottom:20px;
  animation: pop 1s ease;
}

@keyframes pop {
  0% { transform: scale(0.5); opacity:0; }
  60% { transform: scale(1.2); }
  100% { transform: scale(1); opacity:1; }
}

.left { flex:1; }
.right { flex:1; }

input {
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border:none;
  border-radius:12px;
}

button {
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  background:linear-gradient(135deg,#ff4fd8,#6a00ff);
  color:white;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
}

button:hover {
  transform:scale(1.05);
}

.success {
  display:none;
  text-align:center;
  font-size:18px;
}
</style>
</head>

<body>

<!-- ☁️ עננים -->
<div class="cloud"></div>
<div class="cloud"></div>

<div class="box">

  <div class="left">
    <div class="logo">🌟 MOVIES.pop </div>

    <h2>30 יום חינם</h2>
    <p>כל הסרטים והסדרות פתוחים לצפייה</p>

    <p>✔ גישה מלאה</p>
    <p>✔ אזור אישי</p>
    <p>✔ ללא התחייבות</p>
  </div>

  <div class="right">

    <div id="form">
      <input id="user" placeholder="שם משתמש">
      <input id="email" placeholder="אימייל">
      <input id="pass" type="password" placeholder="סיסמה">

      <label>
        <input type="checkbox" id="ok"> מאשר תנאים
      </label>

      <button onclick="go()">התחל עכשיו</button>
    </div>

    <div id="done" class="success">
      🎉 ברוך הבא! יש לך 30 יום חינם 🔥
    </div>

  </div>

</div>

<script>
function go(){
  let u = user.value;
  let e = email.value;
  let p = pass.value;
  let ok = document.getElementById("ok").checked;

  if(!u || !e || !p){
    alert("תמלא הכל");
    return;
  }

  if(!ok){
    alert("אשר תנאים");
    return;
  }

  localStorage.setItem("user", u);

  document.getElementById("form").style.display="none";
  document.getElementById("done").style.display="block";
}
</script>

</body>
</html>
