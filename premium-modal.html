<!-- Modal Content (for Premium Signup) -->
<div id="premium-modal" class="premium-modal">
  <div class="premium-modal-content">
    <h2>ההצטרפות שלך לפרימיום!</h2>
    <p>ברוך הבא לעולם של אולטרה פרימיום! כל התוכן בהישג ידך. הירשם עכשיו וקבל 30 יום בחינם!</p>
    
    <form id="premium-signup-form">
      <label for="username">שם משתמש</label>
      <input type="text" id="username" name="username" placeholder="הזן שם משתמש" required>

      <label for="email">אימייל</label>
      <input type="email" id="email" name="email" placeholder="הזן אימייל" required>

      <label for="password">סיסמה</label>
      <input type="password" id="password" name="password" placeholder="הזן סיסמה" required>

      <button type="submit">הצטרף לפרימיום</button>
    </form>

    <button class="close-btn" onclick="closeModal()">סגור</button>
  </div>
</div>
