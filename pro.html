<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>פרימיום 30 יום חינם - MOVIES.pop</title>
<style>
/* רקע ומרכז המסך */
body { display:flex; justify-content:center; align-items:center; height:100vh; overflow:hidden; background: linear-gradient(135deg,#6a00ff,#ff4fd8); font-family:Arial,sans-serif; color:white; margin:0; }

/* עננים */
.cloud { position:absolute; background:rgba(255,255,255,0.15); border-radius:50%; filter:blur(25px); animation: moveClouds linear infinite; z-index:0; }
.cloud1 { width:400px;height:200px;top:10%;left:-400px; animation-duration:120s; }
.cloud2 { width:250px;height:120px;top:50%;left:-300px; animation-duration:90s; }
.cloud3 { width:350px;height:180px;top:30%;left:-350px; animation-duration:150s; }
@keyframes moveClouds { 0% { transform: translateX(0); } 100% { transform: translateX(200vw); } }

/* תיבת טופס */
.box { width:90%; max-width:950px; background:rgba(255,255,255,0.1); border-radius:25px; padding:30px; display:flex; gap:30px; backdrop-filter: blur(15px); position:relative; z-index:2; flex-wrap:wrap; }
.left, .right { flex:1; min-width:250px; }
.logo { font-size:32px; font-weight:bold; margin-bottom:20px; animation: pop 1s ease; }
@keyframes pop { 0% { transform: scale(0.5); opacity:0; } 60% { transform: scale(1.2); } 100% { transform: scale(1); opacity:1; } }

/* קלטים וכפתור */
input { width:100%; padding:12px; margin-bottom:10px; border:none; border-radius:12px; }
button { width:100%; padding:14px; border:none; border-radius:14px; background:linear-gradient(135deg,#ff4fd8,#6a00ff); color:white; font-size:16px; cursor:pointer; transition:0.3s; }
button:hover { transform:scale(1.05); }
.success { display:none; text-align:center; font-size:18px; margin-top:10px; color:#f1c40f; }

/* פופים */
.buttonWrap { position: relative; }
.particles { position: absolute; bottom: -10px; left: 50%; width: 150px; height: 50px; transform: translateX(-50%); pointer-events: none; }
.particle { position: absolute; width: 6px; height: 6px; background: white; border-radius: 50%; opacity: 0.7; animation: rise 1s linear infinite; }
@keyframes rise { 0% { transform: translateY(0) scale(0.5); opacity:1; } 100% { transform: translateY(-50px) scale(0); opacity:0; } }
</style>
</head>
<body>

<!-- ☁️ עננים -->
<div class="cloud cloud1"></div>
<div class="cloud cloud2"></div>
<div class="cloud cloud3"></div>

<div class="box">
  <div class="left">
    <div class="logo">🌟 MOVIES.pop</div>
    <h2>30 יום חינם</h2>
    <p>כל הסרטים והסדרות פתוחים לצפייה</p>
    <p>✔ גישה מלאה</p>
    <p>✔ אזור אישי</p>
    <p>✔ ללא התחייבות</p>
  </div>
  <div class="right">
    <div id="form">
      <input id="user" placeholder="שם משתמש">
      <input id="email" placeholder="אימייל">
      <input id="pass" type="password" placeholder="סיסמה">
      <label><input type="checkbox" id="ok"> מאשר תנאים</label>
      <div class="buttonWrap">
        <button onclick="go()">התחל עכשיו</button>
        <div class="particles"></div>
      </div>
    </div>
    <div id="done" class="success">🎉 ברוך הבא! יש לך 30 יום חינם 🔥</div>
  </div>
</div>

<script>
// --------------------- הרשמה פרימיום ---------------------
function go(){
  let u = document.getElementById("user").value;
  let e = document.getElementById("email").value;
  let p = document.getElementById("pass").value;
  let ok = document.getElementById("ok").checked;

  if(!u || !e || !p){ alert("תמלא הכל"); return; }
  if(!ok){ alert("אשר תנאים"); return; }

  const expire = new Date();
  expire.setDate(expire.getDate() + 30);
  localStorage.setItem("premiumUser", u);
  localStorage.setItem("premiumExpire", expire);

  document.getElementById("form").style.display="none";
  document.getElementById("done").style.display="block";
}

// --------------------- פופים ---------------------
function spawnParticles() {
  const container = document.querySelectorAll(".particles")[0];
  for(let i=0;i<15;i++){
    const p = document.createElement("div");
    p.className = "particle";
    p.style.left = Math.random()*100 + "%";
    p.style.animationDuration = (0.8+Math.random()*0.5) + "s";
    container.appendChild(p);
    setTimeout(()=>p.remove(),1200);
  }
}
document.querySelector("button").addEventListener("mouseenter", spawnParticles);
</script>

</body>
</html>
